kind = "web"
previewPath = "/"
title = "Watch Party"
version = "1.0.0"
id = "artifacts/watch-party"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24913

[services.development]
run = "pnpm --filter @workspace/watch-party run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/watch-party", "run", "build" ]
publicDir = "artifacts/watch-party/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24913"
BASE_PATH = "/"
